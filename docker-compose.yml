services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: navicon-case6-backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      OCR_GPU: ${OCR_GPU:-0}
      QWEN_API_BASE: ${QWEN_API_BASE:-}
      QWEN_MODEL: ${QWEN_MODEL:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: navicon-case6-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000

  nginx:
    image: nginx:1.27-alpine
    container_name: navicon-case6-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/navicon.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
